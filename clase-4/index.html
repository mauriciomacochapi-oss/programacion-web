<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lasañas Maulli - Pedidos</title>
  </head>
  <body>
    <header>
      <h1>las mejores lazañas maulli</h1>
      <p>Inicie su pedido online</p>
    </header>
    <main>
      <!-- Le agregamos el action="#" para que al enviar se recargue la página y se limpie -->
      <form action="#">
        <section>
          <h2>Datos de cliente</h2>
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" />
          <label for="telefono">Telefono</label>
          <input type="tel" id="telefono" name="telefono" />
          <label for="email">Email</label>
          <input type="email" id="email" name="email" />
          <label for="direccion">Direccion</label>
          <input type="text" id="direccion" name="direccion" />
        </section>
        <section>
          <h3>Tamaño:</h3>

          <label for="chica">Chica</label>
          <input type="radio" id="chica" name="tamaño" value="chica" />
          <label for="grande">Grande</label>
          <input type="radio" id="grande" name="tamaño" value="grande" />
        </section>
        <section>
          <h2>Ingredientes</h2>

          <label for="extraqueso">ExtraQueso</label>
          <input
            type="checkbox"
            id="extraqueso"
            name="ingrediente_extraqueso"
            value="extraqueso"
          />
          <label for="carne">Carne</label>
          <input
            type="checkbox"
            id="carne"
            name="ingrediente_carne"
            value="carne"
          />
        </section>
        <section>
          <label for="pasta">Tipo de pasta</label>
          <select id="pasta" name="pasta">
            <option value="delgada">Delgada</option>
            <option value="gruesa">Gruesa</option>
            <option value="integral">Integral</option>
          </select>
        </section>
        <h2>Comentarios</h2>
        <textarea
          id="comentarios"
          name="comentarios"
          rows="4"
          cols="30"
          required
        ></textarea>

        <br />
        <button type="submit">Enviar pedido</button>
      </form>
    </main>

    <footer>
      <p>© 2026 Lasañas Maulli - llame ahora!</p>
    </footer>
  </body>
</html>
